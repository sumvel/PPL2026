<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, rgba(99,102,241,0.25), transparent 40%),
                  radial-gradient(circle at bottom right, rgba(14,165,233,0.2), transparent 30%),
                  #0b1020;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 800px;
      padding: 40px 20px;
    }

    h1 {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.1;
    }

    .gradient {
      background: linear-gradient(to right, #67e8f9, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin-top: 20px;
      color: #cbd5f5;
      font-size: 18px;
    }

    .progress-container {
      margin-top: 40px;
      text-align: left;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress {
      height: 100%;
      width: 72%;
      background: linear-gradient(to right, #67e8f9, #818cf8);
      animation: load 2s ease;
    }

    @keyframes load {
      from { width: 0; }
      to { width: 72%; }
    }

    .card {
      margin-top: 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    input {
      width: 70%;
      padding: 12px 16px;
      border-radius: 999px;
      border: none;
      outline: none;
      margin-right: 10px;
    }

    button {
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      background: #67e8f9;
      cursor: pointer;
      font-weight: 600;
    }

    .floating {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 8s ease-in-out infinite;
    }

    .f1 { background: #22d3ee; top: 10%; left: -50px; }
    .f2 { background: #818cf8; bottom: 10%; right: -50px; animation-delay: 2s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(20px); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 40px; }
      input { width: 100%; margin-bottom: 10px; }
    }
  </style>
</head>
<body>

<div class="floating f1"></div>
<div class="floating f2"></div>

<div class="container">
  <h1>
    Site under <br>
    <span class="gradient">construction</span>
  </h1>

  <p>
    We're building something amazing. Stay tuned — we'll be live soon.
  </p>

  <div class="progress-container">
    <div style="display:flex; justify-content:space-between; font-size:14px; color:#94a3b8;">
      <span>Progress</span>
      <span>72%</span>
    </div>
    <div class="progress-bar">
      <div class="progress"></div>
    </div>
  </div>

  <div class="card">
    <p style="margin-bottom: 15px;">Explore previous versions</p>
    <a href="https://sumvel.github.io/2022_WCT20/"> <button>T20 WC 22</button> </a>
    <a href="https://sumvel.github.io/CC_2022/DashBoard.html"> <button>Cricket Carnival IPL 22</button> </a>
  </div>
</div>
</body>
</html>
