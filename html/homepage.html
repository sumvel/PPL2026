<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Fantasy Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
    }

    .light {
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #111827;
    }
  </style>
</head>
<body id="app" class="bg-[var(--bg)] text-[var(--text)] font-sans transition-colors duration-300">

  <!-- Navbar -->
  <header class="flex justify-between items-center px-6 py-4 border-b border-gray-700">
    <div class="flex items-center gap-3">
      <img id="logo"
       src="/PPL2026/images/team-logo/ppl_dark_logo.svg"
       class="h-10"
       alt="IPL Fantasy">
      <!--<h1 class="text-xl font-bold">Prediction Premier League</h1>-->
    </div>

    <div class="flex items-center gap-4">
      <nav class="space-x-6 hidden md:block">
        <a href="/PPL2026/html/player.html" class="hover:text-yellow-400">My Picks</a>
        <a href="#" class="hover:text-yellow-400">Center Level</a>
        <a href="#" class="hover:text-yellow-400">Hall of Fame</a>
        <a href="#" class="hover:text-yellow-400">Team</a>
      </nav>

      <!-- Theme Toggle -->
      <button id="themeToggle" class="px-3 py-1 rounded-lg bg-gray-700 text-sm">
        🌙
      </button>
    </div>
  </header>

  <!-- Last Updated -->
  <section class="text-right px-5 text-[var(--text)]">
    <p class="font-bold">Last Updated : 21st March 2023</p>
  </section>

  <!-- Hero -->
  <section class="text-center py-10">
    <h2 class="text-4xl font-bold mb-4">Predict. Compete. Win.</h2>
    <p class="text-gray-400">Pick match winners and climb the leaderboard</p>
  </section>

  <!-- Next Matches Section -->
  <section class="px-6 mb-12">
    <h3 class="text-2xl font-semibold mb-6">🏏 Next Matches</h3>
    <div id="nextMatches" class="space-y-6"></div>
  </section>

  <script type="module">
    import { initNextMatches } from '/PPL2026/src/js/nextmatch.js';
    initNextMatches();
  </script>

  <!-- Leaderboard Section -->
  <section class="px-6 mb-12">
    <!-- <h3 class="text-2xl font-semibold mb-6 span"></h3> -->
    <!-- Player Leaderboard -->
    <!-- Grid Container -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mx-auto">

    <!-- Player Leaderboard -->
    <div>
      <h2 class="text-xl font-semibold mb-4 text-center">
        🏆 Player Leaderboard
      </h2>
      <div id="playerLeaderboard" class="space-y-3"></div>
    </div>

    <!-- Division Leaderboard -->
    <div>
      <h2 class="text-xl font-semibold mb-4 text-center">
        🏢 Center Leaderboard
      </h2>
      <div id="centerLeaderboard" class="space-y-3"></div>
    </div>

    <div>

      <div class="flex items-center justify-between mb-3">
        
        <button id="prevMatchBtn" class="px-3 py-1 rounded">
          ⬅️
        </button>

        <button id="nextMatchBtn" class="px-3 py-1 rounded">
          ➡️
        </button>

      </div>

      <!-- Chart -->
      <canvas id="supportChart"></canvas>

    </div>
  </div>
  </section>

  <!-- Next Matches Section -->
  <section class="px-6 mb-12">
    <h3 class="text-2xl font-semibold mb-6">🏏 Center Level Participation</h3>
    <div id="nextMatches" class="space-y-6"></div>

    <div class="relative p-5 rounded-2xl 
    bg-gradient-to-br from-[#0f172a] via-[#111827] to-[#020617] 
    shadow-lg shadow-slate-900/40 
    border border-white/10 
    backdrop-blur-md 
    overflow-hidden">
      <canvas id="participationChart" height="40"></canvas>
    </div>
  </section>

  <script type="module">
    import { initLeaderboards } from '/PPL2026/src/js/leaderboard.js';
    initLeaderboards();
  </script>

  <script type="module">
    import { renderParticipationChart } from '/PPL2026/src/js/participationChart.js';

    renderParticipationChart("participationChart");
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module">
  import { initSupportChart } from '/PPL2026/src/js/supportChart.js';

    initSupportChart({
      canvasId: "supportChart",
      nextBtnId: "nextMatchBtn",
      prevBtnId: "prevMatchBtn"
    });
  </script>
  
  <!-- Footer -->
  <footer class="text-center py-6 border-t border-gray-700 text-gray-400 mt-12">
    © 2026 IPL Fantasy Predictor
  </footer>

  <script>
    // Theme Toggle Logic
    const app = document.getElementById("app");
    const toggle = document.getElementById("themeToggle");
    const logo = document.getElementById("logo");

    // Load saved theme
    if (localStorage.getItem("theme") === "light") {
      app.classList.add("light");
      toggle.innerText = "☀️";
    }
    updateLogo();

    function updateLogo() {
      const isLight = app.classList.contains("light");
      logo.src = isLight
        ? "/PPL2026/images/team-logo/ppl_light_logo.svg"
        : "/PPL2026/images/team-logo/ppl_dark_logo.svg";
    }

    toggle.addEventListener("click", () => {
      app.classList.toggle("light");

      const isLight = app.classList.contains("light");
      toggle.innerText = isLight ? "☀️" : "🌙";

      localStorage.setItem("theme", isLight ? "light" : "dark");

      updateLogo();
    });
  </script>

</body>
</html>
